<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Tracker{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0f14;--surface:#151820;--surface2:#1c2030;
      --border:#2a2f45;--accent:#f0c060;--accent2:#60d4f0;
      --danger:#f06080;--success:#60f0a0;--text:#e8eaf2;
      --muted:#7a8099;--radius:12px;
    }
    body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;
      background-image:linear-gradient(rgba(240,192,96,0.03) 1px,transparent 1px),
                       linear-gradient(90deg,rgba(240,192,96,0.03) 1px,transparent 1px);
      background-size:40px 40px;pointer-events:none;z-index:0;}
    .wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:40px 20px 80px;}

    /* NAV */
    nav{position:relative;z-index:1;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 30px;display:flex;align-items:center;gap:16px;}
    .nav-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--accent);text-decoration:none;}
    .nav-user{margin-left:auto;font-size:12px;color:var(--muted);}
    .nav-user span{color:var(--accent2);}
    .nav-link{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:6px 14px;border:1px solid var(--border);border-radius:6px;transition:all 0.15s;}
    .nav-link:hover{color:var(--accent);border-color:var(--accent);}
    .nav-link.danger:hover{color:var(--danger);border-color:var(--danger);}
    .profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;}
    @media(max-width:640px){.profile-grid{grid-template-columns:1fr;}}
    .profile-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;}
    .profile-card.full{grid-column:1/-1;}
    .card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:18px;}
    .avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#0d0f14;margin-bottom:14px;}
    .profile-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px;}
    .profile-email{font-size:12px;color:var(--muted);margin-bottom:4px;}
    .profile-joined{font-size:11px;color:var(--muted);opacity:0.6;}
    .stat-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:16px;}
    .mini-stat{flex:1;min-width:70px;background:var(--surface2);border-radius:8px;padding:12px;text-align:center;}
    .mini-stat-num{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
    .mini-stat-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
    .subject-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
    .subject-row:last-child{border-bottom:none;}
    .subject-name{flex:1;font-size:13px;}
    .subject-count{font-size:12px;color:var(--muted);}
    .subject-bar-wrap{width:80px;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
    .subject-bar{height:100%;background:var(--accent);border-radius:3px;}
    .recent-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;}
    .recent-item:last-child{border-bottom:none;}
    .recent-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .recent-dot.done{background:var(--success);}
    .recent-dot.pending{background:var(--accent);}
    .recent-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .recent-date{color:var(--muted);flex-shrink:0;}
    .settings-row{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);}
    .settings-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
    .settings-row-title{font-size:12px;color:var(--text);font-weight:500;margin-bottom:6px;}
    .settings-row-sub{font-size:11px;color:var(--muted);margin-bottom:10px;}
    .inline-form{display:flex;gap:10px;flex-wrap:wrap;}
    .inline-form input{flex:1;min-width:160px;}
    .btn-sm{padding:9px 18px;border:none;border-radius:7px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
    .btn-save{background:var(--accent);color:#0d0f14;}
    .btn-save:hover{background:#f7d080;}
    .btn-danger{background:rgba(240,96,128,0.15);color:var(--danger);border:1px solid rgba(240,96,128,0.3);}
    .btn-danger:hover{background:rgba(240,96,128,0.25);}
    .danger-zone{border-color:rgba(240,96,128,0.3)!important;}
    .danger-zone .card-title{color:var(--danger);}
    .progress-wrap{margin-top:14px;}
    .progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px;}
    .progress-bar-bg{background:var(--surface2);border-radius:4px;height:8px;overflow:hidden;}
    .progress-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));}

    /* FLASH */
    .flash{padding:12px 18px;border-radius:8px;margin-bottom:16px;font-size:13px;}
    .flash.success{background:rgba(96,240,160,0.1);border:1px solid rgba(96,240,160,0.3);color:var(--success);}
    .flash.error  {background:rgba(240,96,128,0.1);border:1px solid rgba(240,96,128,0.3);color:var(--danger);}
    .flash.info   {background:rgba(96,212,240,0.1);border:1px solid rgba(96,212,240,0.3);color:var(--accent2);}

    /* AUTH CARD */
    .auth-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 60px);padding:30px 20px;}
    .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:100%;max-width:420px;}
    .auth-tag{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
    .auth-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:6px;}
    .auth-sub{color:var(--muted);font-size:12px;margin-bottom:28px;}
    .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
    label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
    input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:11px 14px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;width:100%;}
    input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(240,192,96,0.1);}
    .btn-main{background:var(--accent);color:#0d0f14;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:13px 28px;cursor:pointer;width:100%;transition:transform 0.15s,box-shadow 0.15s;margin-top:8px;}
    .btn-main:hover{background:#f7d080;transform:translateY(-1px);box-shadow:0 6px 20px rgba(240,192,96,0.25);}
    .auth-switch{text-align:center;margin-top:20px;font-size:12px;color:var(--muted);}
    .auth-switch a{color:var(--accent);text-decoration:none;}
    .auth-switch a:hover{text-decoration:underline;}

    /* STATS */
    .stats{display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap;}
    .stat{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;position:relative;overflow:hidden;}
    .stat::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
    .stat.total::after  {background:var(--accent2);}
    .stat.pending::after{background:var(--accent);}
    .stat.overdue::after{background:var(--danger);}
    .stat.done::after   {background:var(--success);}
    .stat-num{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;line-height:1;margin-bottom:4px;}
    .stat.total .stat-num  {color:var(--accent2);}
    .stat.pending .stat-num{color:var(--accent);}
    .stat.overdue .stat-num{color:var(--danger);}
    .stat.done .stat-num   {color:var(--success);}
    .stat-label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}

    /* FORM CARD */
    .form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:32px;}
    .form-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:20px;}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
    @media(max-width:600px){.form-grid{grid-template-columns:1fr;}}
    .form-group.full{grid-column:1/-1;}
    input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.6);cursor:pointer;}
    select option{background:#1c2030;}
    textarea{resize:vertical;min-height:72px;}
    .btn-add{background:var(--accent);color:#0d0f14;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:12px 28px;cursor:pointer;width:100%;transition:transform 0.15s,box-shadow 0.15s;}
    .btn-add:hover{background:#f7d080;transform:translateY(-1px);box-shadow:0 6px 20px rgba(240,192,96,0.25);}

    /* TOOLBAR */
    .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;}
    .filter-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;cursor:pointer;text-decoration:none;transition:all 0.15s;}
    .filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(240,192,96,0.1);}

    /* TASKS */
    .section-label{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
    .section-label::after{content:'';flex:1;height:1px;background:var(--border);}
    .task-list{display:flex;flex-direction:column;gap:10px;}
    .task{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;display:flex;align-items:flex-start;gap:16px;position:relative;overflow:hidden;transition:border-color 0.2s;}
    .task::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
    .task.priority-high::before  {background:var(--danger);}
    .task.priority-medium::before{background:var(--accent);}
    .task.priority-low::before   {background:var(--accent2);}
    .task.is-done   {opacity:0.5;}
    .task.is-overdue{border-color:rgba(240,96,128,0.4);}
    .check-btn{width:22px;height:22px;min-width:22px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;margin-top:2px;text-decoration:none;color:transparent;font-size:12px;font-weight:bold;}
    .check-btn:hover{border-color:var(--success);background:rgba(96,240,160,0.1);}
    .task.is-done .check-btn{background:var(--success);border-color:var(--success);color:#0d0f14;}
    .task-body{flex:1;min-width:0;}
    .task-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
    .task-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
    .task.is-done .task-name{text-decoration:line-through;color:var(--muted);}
    .badge{font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:4px;font-weight:500;}
    .badge-subject{background:rgba(96,212,240,0.12);color:var(--accent2);}
    .badge-high   {background:rgba(240,96,128,0.12);color:var(--danger);}
    .badge-medium {background:rgba(240,192,96,0.12);color:var(--accent);}
    .badge-low    {background:rgba(96,212,240,0.12);color:var(--accent2);}
    .badge-overdue{background:rgba(240,96,128,0.18);color:var(--danger);border:1px solid rgba(240,96,128,0.3);}
    .badge-type   {background:rgba(255,255,255,0.05);color:var(--muted);}
    .task-desc{font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.5;}
    .task-due{font-size:11px;color:var(--muted);}
    .task-due.overdue{color:var(--danger);}
    .task-due.soon,.task-due.today{color:var(--accent);}
    .task-actions{display:flex;gap:8px;}
    .btn-del{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;text-decoration:none;transition:all 0.15s;}
    .btn-del:hover{border-color:var(--danger);color:var(--danger);background:rgba(240,96,128,0.08);}
    .empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px;}
    .empty-icon{font-size:40px;margin-bottom:12px;opacity:0.5;}

    header{margin-bottom:40px;}
    .header-tag{display:inline-block;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);border:1px solid rgba(240,192,96,0.3);padding:4px 12px;border-radius:4px;margin-bottom:16px;}
    h1{font-family:'Syne',sans-serif;font-size:clamp(24px,4vw,44px);font-weight:800;line-height:1.05;letter-spacing:-1px;}
    h1 span{color:var(--accent);}
    .subtitle{color:var(--muted);font-size:13px;margin-top:10px;}
  </style>
</head>
<body>
{% block nav %}{% endblock %}
{% block content %}{% endblock %}
</body>
</html>
